<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Idea Garden — Hi-Fi</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    html, body, #root { margin: 0; padding: 0; min-height: 100%; width: 100%; }
    body {
      background: radial-gradient(120% 80% at 50% 0%, #F2E6CB 0%, #E8D9B6 60%, #DDC9A0 100%);
      font-family: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
      color: #1B2A22;
      overflow-x: hidden;
      transition: background 0.4s ease;
    }
    *, *::before, *::after { box-sizing: border-box; }
    button { font-family: inherit; }
    input::placeholder, textarea::placeholder { color: #8A938E; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }

    /* Animations */
    @keyframes hi-floatup {
      0%   { opacity: 0; transform: translateX(-50%) translateY(20px) scale(0.9); }
      18%  { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1.04); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-80px) scale(0.92); }
    }
    @keyframes hi-bob {
      0%, 100% { transform: translateY(0) rotate(var(--r, 0deg)); }
      50%      { transform: translateY(-8px) rotate(var(--r, 0deg)); }
    }
    @keyframes hi-shimmer {
      0%   { background-position: -100% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes hi-pulse {
      0%, 100% { transform: scale(1);   box-shadow: 0 0 0 0   rgba(232,154,60,0.5); }
      50%      { transform: scale(1.04); box-shadow: 0 0 0 8px rgba(232,154,60,0); }
    }
    @keyframes hi-sproutpop {
      0%   { opacity: 0; transform: translate(-50%, 30px) scale(0.6); }
      30%  { opacity: 1; transform: translate(-50%, -10px) scale(1.08); }
      70%  { opacity: 1; transform: translate(-50%, -30px) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -70px) scale(0.9); }
    }
    @keyframes hi-confetti {
      0%   { opacity: 1; transform: translateY(0) rotate(0); }
      100% { opacity: 0; transform: translateY(900px) rotate(720deg); }
    }
    @keyframes hi-popin {
      0%   { opacity: 0; transform: translateY(60px) scale(0.85); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Bricolage on body but Jakarta is the default. Override per-element. */
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="hi-tokens.jsx"></script>
  <script type="text/babel" src="hi-widgets.jsx"></script>
  <script type="text/babel" src="hi-screens.jsx"></script>
  <script type="text/babel" src="hi-app.jsx"></script>
</body>
</html>
